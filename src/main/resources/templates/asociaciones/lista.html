<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Asociaciones</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body{background:#0d1117;color:#e6edf3;}
    .dark-card{background:#161b22;border:1px solid #21262d;border-radius:12px;overflow:hidden;}
    table td,table th{border-color:#21262d!important;color:#e6edf3!important;vertical-align:middle;}
    thead th{background:#0d2550!important;color:#f0c040!important;}
    tbody tr:hover{background:#1c2030!important;}
  </style>
</head>
<body>
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container py-5">
    <h2 style="color:#f0c040;font-weight:700;" class="mb-4">
      &#127758; Asociaciones
      <span style="background:rgba(168,85,247,0.15);color:#c084fc;border:1px solid #c084fc;padding:2px 10px;border-radius:20px;font-size:.75rem;">@ManyToOne desde Club</span>
    </h2>
    <div class="dark-card">
      <table class="table mb-0">
		<table class="table table-dark table-hover mb-0" style="background: transparent;">
        <thead><tr><th>#</th><th>Nombre</th><th>Pais</th><th>Presidente</th></tr></thead>
        <tbody>
          <tr th:each="a : ${asociaciones}">
            <td th:text="${a.id}"></td>
            <td class="fw-bold" th:text="${a.nombre}"></td>
            <td><span style="background:rgba(168,85,247,0.15);color:#c084fc;border:1px solid #c084fc;padding:2px 9px;border-radius:20px;font-size:.75rem;" th:text="${a.pais}"></span></td>
            <td style="color:#8b949e;" th:text="${a.presidente}"></td>
          </tr>
        </tbody>
      </table>
	  </table>
    </div>
    <div class="mt-4 p-3 rounded" style="background:rgba(168,85,247,0.08);border:1px solid #c084fc;">
      <strong style="color:#c084fc;">@ManyToOne:</strong>
      <span style="color:#8b949e;font-size:.85rem;"> Muchos clubes pueden pertenecer a la misma asociacion. FK <code>asociacion_id</code> vive en la tabla <code>clubes</code>.</span>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
