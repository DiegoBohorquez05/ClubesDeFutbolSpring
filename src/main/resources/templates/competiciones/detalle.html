<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Competicion</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>body{background:#0d1117;color:#e6edf3;} .dark-card{background:#161b22;border:1px solid #21262d;border-radius:14px;}</style>
</head>
<body>
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container py-5" style="max-width:500px;">
    <a th:href="@{/competiciones}" class="btn btn-sm btn-outline-secondary mb-4">&#8592; Volver</a>
    <div class="dark-card overflow-hidden">
      <div class="p-4 text-center" style="background:#0d2550;border-bottom:1px solid #21262d;">
        <div style="font-size:3rem;">&#127942;</div>
        <h3 class="fw-bold mt-2" style="color:#f0c040;" th:text="${competicion.nombre}"></h3>
      </div>
      <div class="p-4">
        <div class="p-3 rounded mb-3" style="background:#0d2550;">
          <p class="mb-1">Premio: <strong style="color:#f0c040;">$<span th:text="${#numbers.formatInteger(competicion.montoPremio,1,'COMMA')}"></span></strong></p>
          <p class="mb-1 small" style="color:#8b949e;">Inicio: <span th:text="${competicion.fechaInicio}"></span></p>
          <p class="mb-0 small" style="color:#8b949e;">Fin: <span th:text="${competicion.fechaFin}"></span></p>
        </div>
        <div class="p-3 rounded" style="background:rgba(239,68,68,0.08);border:1px solid #f87171;">
          <strong style="color:#f87171;">@ManyToMany</strong>
          <p class="mb-0 small mt-1" style="color:#8b949e;">Relacion con Club a traves de tabla intermedia <code>clubes_competiciones</code>. Un club puede estar en muchas competiciones.</p>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
