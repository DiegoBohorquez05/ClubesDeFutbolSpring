<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Competiciones</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>body{background:#0d1117;color:#e6edf3;} .dark-card{background:#161b22;border:1px solid #21262d;border-radius:12px;transition:border-color .2s,transform .2s;} .dark-card:hover{border-color:#f87171;transform:translateY(-3px);}</style>
</head>
<body>
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container py-5">
    <h2 style="color:#f0c040;font-weight:700;" class="mb-4">
      &#127942; Competiciones
      <span style="background:rgba(239,68,68,0.15);color:#f87171;border:1px solid #f87171;padding:2px 10px;border-radius:20px;font-size:.75rem;">@ManyToMany con Club</span>
    </h2>
    <div class="row g-4">
      <div class="col-md-4" th:each="c : ${competiciones}">
        <div class="dark-card p-4 h-100">
          <div style="font-size:2rem; margin-bottom:8px;">&#127942;</div>
          <h5 class="fw-bold mb-2" style="color:#f0c040;" th:text="${c.nombre}"></h5>
          <p class="small mb-1" style="color:#8b949e;">Premio: <strong style="color:#f0c040;">$<span th:text="${#numbers.formatInteger(c.montoPremio,1,'COMMA')}"></span></strong></p>
          <p class="small mb-1" style="color:#8b949e;">Inicio: <span th:text="${c.fechaInicio}"></span></p>
          <p class="small mb-3" style="color:#8b949e;">Fin: <span th:text="${c.fechaFin}"></span></p>
          <a th:href="@{/competiciones/{id}(id=${c.id})}" class="btn btn-sm w-100" style="background:rgba(239,68,68,0.15);color:#f87171;border:1px solid #f87171;">Ver detalle</a>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
