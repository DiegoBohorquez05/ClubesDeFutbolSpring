<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Nuevo Jugador</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body{background:#0d1117;color:#e6edf3;}
    .dark-card{background:#161b22;border:1px solid #21262d;border-radius:12px;}
    .form-control, .form-select { background-color: #0d1117 !important; color: #e6edf3 !important; border: 1px solid #30363d !important; }
    .form-control:focus, .form-select:focus { border-color: #f0c040 !important; box-shadow: 0 0 0 0.25rem rgba(240, 192, 64, 0.25) !important; }
  </style>
</head>
<body>
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  
  <div class="container py-5" style="max-width: 600px;">
    <h2 style="color:#f0c040;font-weight:700;" class="mb-4">&#128104;&#8205;&#9917;&#65039; Registrar Nuevo Jugador</h2>
    
    <div class="dark-card p-4">
      <form th:action="@{/jugadores/guardar}" th:object="${jugador}" method="post">
        
        <div class="mb-3">
          <label class="form-label fw-bold">Nombre</label>
          <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Erling" required/>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Apellido</label>
          <input type="text" th:field="*{apellido}" class="form-control" placeholder="Ej: Haaland" required/>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Número de Camiseta</label>
            <input type="number" th:field="*{numero}" class="form-control" min="1" max="99" placeholder="9" required/>
          </div>
          
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Posición</label>
            <select th:field="*{posicion}" class="form-select" required>
              <option value="">-- Seleccionar --</option>
              <option value="Portero">Portero</option>
              <option value="Defensa">Defensa</option>
              <option value="Centrocampista">Centrocampista</option>
              <option value="Delantero">Delantero</option>
            </select>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-bold">Asignar a un Club</label>
          <select name="clubId" class="form-select" required>
            <option value="">-- Seleccionar un Equipo --</option>
            <option th:each="c : ${listaClubes}" th:value="${c.id}" th:text="${c.nombre}"></option>
          </select>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn fw-bold" style="background:#f0c040;color:#0a0e1a;">Guardar Jugador</button>
          <a th:href="@{/jugadores}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
