<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Clubes Europa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body{background:#0d1117;color:#e6edf3;}
    .section-title{color:#f0c040;font-weight:700;font-size:1.3rem;}
    .dark-card{background:#161b22;border:1px solid #21262d;border-radius:12px;}
    thead th{background:#0d2550!important;color:#f0c040!important;border:none!important;}
    tbody tr{border-color:#21262d!important;}
    tbody tr:hover{background:#1c2030!important;}
    td{color:#e6edf3!important;border-color:#21262d!important;vertical-align:middle;}
    .rel-pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.7rem;font-weight:600;}
    .pill-1to1{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid #4ade80;}
    .pill-Nto1{background:rgba(168,85,247,0.15);color:#c084fc;border:1px solid #c084fc;}
  </style>
</head>
<body>
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="section-title mb-0">&#127968; Clubes Europeos</h2>
      <a th:href="@{/clubes/nuevo}" class="btn btn-sm fw-bold" style="background:#f0c040;color:#0a0e1a;">
        <i class="bi bi-plus-circle"></i> Nuevo Club
      </a>
    </div>
    <div class="dark-card overflow-hidden">
      <table class="table mb-0">
		<table class="table table-dark table-hover mb-0" style="background: transparent;">
        <thead>
          <tr>
            <th>#</th><th>Club</th><th>Ciudad</th><th>Fundacion</th>
            <th>Entrenador <span class="rel-pill pill-1to1">@OneToOne</span></th>
            <th>Asociacion <span class="rel-pill pill-Nto1">@ManyToOne</span></th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="c : ${clubes}">
            <td th:text="${c.id}"></td>
            <td>
              <div class="d-flex align-items-center gap-2">
                <span style="font-size:1.2rem;">&#9917;</span>
                <strong th:text="${c.nombre}"></strong>
              </div>
            </td>
            <td th:text="${c.ciudad}"></td>
            <td th:text="${c.anioFundacion}"></td>
            <td>
              <span th:if="${c.entrenador != null}" style="color:#4ade80;" th:text="${c.entrenador.nombre + ' ' + c.entrenador.apellido}"></span>
              <span th:if="${c.entrenador == null}" style="color:#8b949e;">-</span>
            </td>
            <td>
              <span th:if="${c.asociacion != null}" class="rel-pill pill-Nto1" th:text="${c.asociacion.nombre}"></span>
              <span th:if="${c.asociacion == null}" style="color:#8b949e;">-</span>
            </td>
            <td>
              <a th:href="@{/clubes/{id}(id=${c.id})}" class="btn btn-sm me-1" style="background:#f0c040;color:#0a0e1a;">
                <i class="bi bi-eye"></i>
              </a>
              <a th:href="@{/clubes/eliminar/{id}(id=${c.id})}" class="btn btn-sm btn-outline-danger"
                 onclick="return confirm('Eliminar?')"><i class="bi bi-trash"></i></a>
            </td>
          </tr>
        </tbody>
      </table>
	  </table>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
