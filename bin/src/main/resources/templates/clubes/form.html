<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Nuevo Club</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body{background:#0d1117;color:#e6edf3;}
    .dark-card{background:#161b22;border:1px solid #21262d;border-radius:14px;}
    .form-control,.form-select{background:#0d1117!important;border:1px solid #30363d!important;color:#e6edf3!important;}
    .form-control:focus,.form-select:focus{border-color:#f0c040!important;box-shadow:0 0 0 3px rgba(240,192,64,.15)!important;}
    label{color:#8b949e;font-size:.85rem;}
  </style>
</head>
<body>
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container py-5" style="max-width:560px;">
    <h2 style="color:#f0c040;font-weight:700;" class="mb-4">&#43; Nuevo Club</h2>
    <div class="dark-card p-4">
      <form th:action="@{/clubes/guardar}" th:object="${club}" method="post">
        <div class="mb-3">
          <label class="form-label">Nombre del Club</label>
          <input type="text" class="form-control" th:field="*{nombre}" placeholder="Ej: Bayern Munich" required/>
        </div>
        <div class="mb-3">
          <label class="form-label">Ciudad</label>
          <input type="text" class="form-control" th:field="*{ciudad}" placeholder="Ej: Munich" required/>
        </div>
        <div class="mb-3">
          <label class="form-label">Año de Fundacion</label>
          <input type="number" class="form-control" th:field="*{anioFundacion}" min="1800" max="2025" required/>
        </div>
        <div class="mb-3">
          <label class="form-label">Entrenador &nbsp;<span style="background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid #4ade80;padding:1px 7px;border-radius:20px;font-size:.7rem;">@OneToOne</span></label>
          <select class="form-select" th:field="*{entrenador.id}">
            <option value="">-- Sin entrenador --</option>
            <option th:each="e : ${entrenadores}" th:value="${e.id}" th:text="${e.nombre + ' ' + e.apellido}"></option>
          </select>
        </div>
        <div class="mb-4">
          <label class="form-label">Asociacion &nbsp;<span style="background:rgba(168,85,247,0.15);color:#c084fc;border:1px solid #c084fc;padding:1px 7px;border-radius:20px;font-size:.7rem;">@ManyToOne</span></label>
          <select class="form-select" th:field="*{asociacion.id}">
            <option value="">-- Sin asociacion --</option>
            <option th:each="a : ${asociaciones}" th:value="${a.id}" th:text="${a.nombre}"></option>
          </select>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn w-100 fw-bold" style="background:#f0c040;color:#0a0e1a;">Guardar</button>
          <a th:href="@{/clubes}" class="btn btn-outline-secondary w-100">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
