<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Jugador</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>body{background:#0d1117;color:#e6edf3;} .dark-card{background:#161b22;border:1px solid #21262d;border-radius:14px;}</style>
</head>
<body>
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container py-5" style="max-width:460px;">
    <a th:href="@{/jugadores}" class="btn btn-sm btn-outline-secondary mb-4">&#8592; Volver</a>
    <div class="dark-card p-5 text-center">
      <div style="width:90px;height:90px;background:#0d2550;border:3px solid #f0c040;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#f0c040;font-size:2rem;font-weight:800;margin:0 auto 20px;" th:text="${jugador.numero}"></div>
      <h3 class="fw-bold" th:text="${jugador.nombre + ' ' + jugador.apellido}"></h3>
      <span style="background:rgba(59,130,246,0.15);color:#60a5fa;border:1px solid #60a5fa;padding:4px 14px;border-radius:20px;font-size:.9rem;" th:text="${jugador.posicion}"></span>
      <div class="mt-4 p-3 rounded" style="background:#0d2550;">
        <small style="color:#8b949e;">Relacion: <strong style="color:#60a5fa;">@OneToMany desde Club</strong></small><br/>
        <small style="color:#8b949e;">FK <code>id_club</code> vive en esta tabla (jugadores)</small>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
