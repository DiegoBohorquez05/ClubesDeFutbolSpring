<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Jugadores</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body{background:#0d1117;color:#e6edf3;}
    .dark-card{background:#161b22;border:1px solid #21262d;border-radius:12px;overflow:hidden;}
    table td,table th{border-color:#21262d!important;color:#e6edf3!important;vertical-align:middle;}
    thead th{background:#0d2550!important;color:#f0c040!important;}
    tbody tr:hover{background:#1c2030!important;}
  </style>
</head>
<body>
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container py-5">
    <h2 style="color:#f0c040;font-weight:700;" class="mb-4">
      &#128100; Jugadores
      <span style="background:rgba(59,130,246,0.15);color:#60a5fa;border:1px solid #60a5fa;padding:2px 10px;border-radius:20px;font-size:.75rem;font-weight:600;">@OneToMany desde Club</span>
    </h2>
    <div class="dark-card">
      <table class="table mb-0">
        <thead>
          <tr><th>#</th><th>Camiseta</th><th>Nombre</th><th>Apellido</th><th>Posicion</th><th>Ver</th></tr>
        </thead>
        <tbody>
          <tr th:each="j : ${jugadores}">
            <td th:text="${j.id}"></td>
            <td><span style="background:#f0c040;color:#0a0e1a;border-radius:50%;width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;font-weight:800;" th:text="${j.numero}"></span></td>
            <td th:text="${j.nombre}"></td>
            <td class="fw-bold" th:text="${j.apellido}"></td>
            <td><span style="background:rgba(59,130,246,0.15);color:#60a5fa;border:1px solid #60a5fa;padding:2px 9px;border-radius:20px;font-size:.75rem;" th:text="${j.posicion}"></span></td>
            <td><a th:href="@{/jugadores/{id}(id=${j.id})}" class="btn btn-sm" style="background:#f0c040;color:#0a0e1a;"><i class="bi bi-eye"></i></a></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
