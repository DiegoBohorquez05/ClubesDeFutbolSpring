<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Entrenadores</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>body{background:#0d1117;color:#e6edf3;} .dark-card{background:#161b22;border:1px solid #21262d;border-radius:12px;transition:border-color .2s,transform .2s;} .dark-card:hover{border-color:#4ade80;transform:translateY(-3px);}</style>
</head>
<body>
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container py-5">
    <h2 style="color:#f0c040;font-weight:700;" class="mb-4">
      &#128203; Entrenadores
      <span style="background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid #4ade80;padding:2px 10px;border-radius:20px;font-size:.75rem;">@OneToOne con Club</span>
    </h2>
    <div class="row g-4">
      <div class="col-md-4" th:each="e : ${entrenadores}">
        <div class="dark-card p-4 text-center h-100">
          <div style="width:64px;height:64px;background:#0d2550;border:2px solid #4ade80;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#4ade80;font-size:1.8rem;margin:0 auto 14px;">&#128100;</div>
          <h5 class="fw-bold mb-1" th:text="${e.nombre + ' ' + e.apellido}"></h5>
          <p style="color:#8b949e;" class="small mb-1" th:text="${e.nacionalidad}"></p>
          <p style="color:#8b949e;" class="small mb-3">Edad: <span th:text="${e.edad}"></span></p>
          <a th:href="@{/entrenadores/{id}(id=${e.id})}" class="btn btn-sm w-100" style="background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid #4ade80;">Ver detalle</a>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
