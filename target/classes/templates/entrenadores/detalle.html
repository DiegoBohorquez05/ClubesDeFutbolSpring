<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Entrenador</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>body{background:#0d1117;color:#e6edf3;} .dark-card{background:#161b22;border:1px solid #21262d;border-radius:14px;}</style>
</head>
<body>
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container py-5" style="max-width:460px;">
    <a th:href="@{/entrenadores}" class="btn btn-sm btn-outline-secondary mb-4">&#8592; Volver</a>
    <div class="dark-card p-5 text-center">
      <div style="width:90px;height:90px;background:#0d2550;border:3px solid #4ade80;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#4ade80;font-size:2.2rem;margin:0 auto 20px;">&#128100;</div>
      <h3 class="fw-bold" th:text="${entrenador.nombre + ' ' + entrenador.apellido}"></h3>
      <p style="color:#8b949e;" class="mb-1">Nacionalidad: <strong style="color:#e6edf3;" th:text="${entrenador.nacionalidad}"></strong></p>
      <p style="color:#8b949e;" class="mb-4">Edad: <strong style="color:#e6edf3;" th:text="${entrenador.edad}"></strong> anos</p>
      <span style="background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid #4ade80;padding:4px 14px;border-radius:20px;">@OneToOne con Club</span>
      <div class="mt-4 p-3 rounded" style="background:#0d2550;">
        <small style="color:#8b949e;">FK <code>entrenador_id</code> vive en la tabla <strong style="color:#e6edf3;">clubes</strong></small>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
